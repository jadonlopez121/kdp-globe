<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kautex Global Team</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b132b;
      font-family: Arial, sans-serif;
    }

    #container {
      width: 100vw;
      height: 100vh;
    }

    #logo {
      position: absolute;
      top: 20px;
      left: 20px;
      height: 70px;
      z-index: 10;
    }

    .popup {
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 10px;
      border-radius: 8px;
      width: 230px;
    }

    .entry {
      border-bottom: 1px solid #444;
      margin-bottom: 8px;
      padding-bottom: 8px;
    }

    .entry:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .profile {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #bbb;
      margin-bottom: 6px;
    }

    .name { font-weight: bold; }
    .role, .plant { font-size: 13px; opacity: 0.9; }
  </style>
</head>

<body>

<img id="logo"
     src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Kautex_Textron_Logo.svg"
     alt="KautE SCRIPT TAGS ARE CRITICAL -->
<script src="https://unpkg.com/three@0.150.1/build/three.min.jsript src="https://unpkg.com/three-globe"></script>

<script>
  const people = [
    { name:"Jadon Lopez", role:"KDP Operations", plant:"KLA", lat:34.44, lng:-83.11 },
    { name:"Shane Skinner", role:"KDP Operations", plant:"KUS", lat:40.81, lng:-89.69 },

    { name:"Hanniatizel Martell", role:"KDP Engineering", plant:"KMX", lat:19.04, lng:-98.20 },
    { name:"Rodrigo Gomez", role:"KDP Engineering", plant:"KMX", lat:19.04, lng:-98.20 },
    { name:"AdrianEnrique Diaz", role:"KDP Operations", plant:"KMX", lat:19.04, lng:-98.20 },

    { name:"Ana Lopez", role:"KDP Operations", plant:"KES", lat:41.38, lng:2.17 },
    { name:"Carolina Garcia-Valdecasas", role:"KDP Operations", plant:"KES", lat:41.38, lng:2.17 },

    { name:"Shreya SagarS", role:"KDP Engineering", plant:"KGJ", lat:23.02, lng:72.57 },
    { name:"Sai Patil", role:"KDP Engineering", plant:"KGJ", lat:23.02, lng:72.57 },

    { name:"Bilal Aizezi", role:"KDP Operations", plant:"KCC", lat:31.23, lng:121.47 },
    { name:"Daria Giotina", role:"KDP Engineering", plant:"KRO", lat:44.33, lng:23.79 },

    { name:"Michael Havelka", role:"KDP Operations", plant:"KCZ", lat:49.01, lng:14.87 },
    { name:"Martin Jadlovsky", role:"KDP Operations", plant:"KCZ", lat:49.01, lng:14.87 },

    { name:"Mouaad ElBakili", role:"KDP Engineering", plant:"KDU", lat:50.74, lng:7.10 }
  ];

  const grouped = {};
  people.forEach(p => {
    const key = `${p.lat},${p.lng}`;
    grouped[key] = grouped[key] || [];
    grouped[key].push(p);
  });

  const points = Object.entries(grouped).map(([k, members]) => {
    const [lat, lng] = k.split(",").map(Number);
    return { lat, lng, members };
  });

  const globe = new ThreeGlobe()
    .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-night.jpg")
    .pointsData(points)
    .pointAltitude(0.02)
    .pointRadius(0.35)
    .pointColor(() => "#00c2ff")
    .pointLabel(d =>
      `<div class="popup">
        ${d.members.map(m => `
          <div class="entry">
            <div class="profile"></div>
            <div class="name">${m.name}</div>
            <div class="role">${m.role}</div>
            <div class="plant">${m.plant}</div>
          </div>
        `).join("")}
      </div>`
    );

  const scene = new THREE.Scene();
  scene.add(globe);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight);
  camera.position.z = 300;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById("container").appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  scene.add(new THREE.DirectionalLight(0xffffff, 0.6));

  let rotate = true;
  globe.onPointHover(p => rotate = !p);

  function animate() {
    if (rotate) globe.rotation.y += 0.002;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();
</script>

</body>
</html>
``
